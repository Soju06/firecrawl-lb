# Production Docker Compose — PostgreSQL backend
# Usage:
#   cp .env.example .env.local   # fill in secrets
#   docker compose -f docker-compose.prod.yml up -d
#
# Requires external PostgreSQL. Set FIRECRAWL_LB_DATABASE_URL in .env.local:
#   FIRECRAWL_LB_DATABASE_URL=postgresql+asyncpg://user:password@host:5432/firecrawllb
services:
  server:
    image: ghcr.io/soju06/firecrawl-lb:latest
    env_file:
      - path: .env.local
        required: false
    ports:
      - "2465:2465"
    volumes:
      - firecrawl-lb-data:/var/lib/firecrawl-lb
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:2465/health/ready')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

volumes:
  firecrawl-lb-data:
    name: firecrawl-lb-data
