apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "firecrawl-lb.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "firecrawl-lb.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  # Database
  FIRECRAWL_LB_DATABASE_MIGRATE_ON_STARTUP: {{ .Values.config.databaseMigrateOnStartup | toString | quote }}
  FIRECRAWL_LB_DATABASE_POOL_SIZE: {{ .Values.config.databasePoolSize | toString | quote }}
  FIRECRAWL_LB_DATABASE_MAX_OVERFLOW: {{ .Values.config.databaseMaxOverflow | toString | quote }}
  FIRECRAWL_LB_UPSTREAM_CONNECT_TIMEOUT_SECONDS: {{ .Values.config.upstreamConnectTimeout | toString | quote }}
  # Logging
  FIRECRAWL_LB_LOG_FORMAT: {{ .Values.config.logFormat | quote }}
  # Metrics
  FIRECRAWL_LB_METRICS_ENABLED: {{ .Values.metrics.enabled | toString | quote }}
  FIRECRAWL_LB_METRICS_PORT: {{ .Values.metrics.port | toString | quote }}
  # Leader election
  FIRECRAWL_LB_LEADER_ELECTION_ENABLED: {{ .Values.config.leaderElectionEnabled | toString | quote }}
  FIRECRAWL_LB_LEADER_ELECTION_TTL_SECONDS: {{ .Values.config.leaderElectionTtlSeconds | toString | quote }}
  # Circuit breaker
  FIRECRAWL_LB_CIRCUIT_BREAKER_ENABLED: {{ .Values.config.circuitBreakerEnabled | toString | quote }}
  FIRECRAWL_LB_CIRCUIT_BREAKER_FAILURE_THRESHOLD: {{ .Values.config.circuitBreakerFailureThreshold | toString | quote }}
  FIRECRAWL_LB_CIRCUIT_BREAKER_RECOVERY_TIMEOUT_SECONDS: {{ .Values.config.circuitBreakerRecoveryTimeoutSeconds | toString | quote }}
  # Backpressure
  FIRECRAWL_LB_BACKPRESSURE_MAX_CONCURRENT_REQUESTS: {{ .Values.config.backpressureMaxConcurrentRequests | toString | quote }}
  # Shutdown
  FIRECRAWL_LB_SHUTDOWN_DRAIN_TIMEOUT_SECONDS: {{ .Values.config.shutdownDrainTimeoutSeconds | toString | quote }}
  # HTTP connector
  FIRECRAWL_LB_HTTP_CONNECTOR_LIMIT: {{ .Values.config.httpConnectorLimit | toString | quote }}
  FIRECRAWL_LB_HTTP_CONNECTOR_LIMIT_PER_HOST: {{ .Values.config.httpConnectorLimitPerHost | toString | quote }}
  {{- if .Values.tracing.enabled }}
  FIRECRAWL_LB_OTEL_ENABLED: "true"
  FIRECRAWL_LB_OTEL_EXPORTER_ENDPOINT: {{ .Values.tracing.endpoint | quote }}
  {{- end }}
