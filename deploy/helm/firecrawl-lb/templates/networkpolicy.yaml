{{- if .Values.networkPolicy.enabled }}
{{- $httpPort := .Values.service.port | default 2465 }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "firecrawl-lb.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "firecrawl-lb.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "firecrawl-lb.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- if .Values.networkPolicy.ingressNSMatchLabels }}
    # Allow HTTP traffic from ingress controller
    - ports:
        - port: {{ $httpPort }}
          protocol: TCP
      from:
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.ingressNSMatchLabels | nindent 14 }}
    {{- end }}
    # Allow metrics scraping from Prometheus
    - ports:
        - port: {{ .Values.metrics.port }}
          protocol: TCP
      from:
        - namespaceSelector: {}
    # Helm test pod
    - from:
        - podSelector:
            matchLabels:
              helm.sh/chart: {{ include "firecrawl-lb.chart" . }}
    {{- with .Values.networkPolicy.extraIngress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  egress:
    # DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # PostgreSQL
    {{- if .Values.postgresql.enabled }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - port: 5432
          protocol: TCP
    {{- else }}
    - ports:
        - port: 5432
          protocol: TCP
    {{- end }}
    - ports:
        - port: 443
          protocol: TCP
    # OTLP gRPC tracing (port 4317)
    {{- if .Values.tracing.enabled }}
    - ports:
        - port: 4317
          protocol: TCP
    {{- end }}
    {{- with .Values.networkPolicy.extraEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
