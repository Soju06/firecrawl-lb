apiVersion: v1
kind: Service
metadata:
  name: {{ include "firecrawl-lb.headlessServiceName" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "firecrawl-lb.labels" . | nindent 4 }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    {{- include "firecrawl-lb.workloadSelectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
