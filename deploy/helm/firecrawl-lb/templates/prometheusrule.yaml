{{- if and .Values.metrics.enabled .Values.metrics.prometheusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "firecrawl-lb.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "firecrawl-lb.labels" . | nindent 4 }}
    {{- with .Values.metrics.prometheusRule.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    - name: firecrawl-lb.rules
      rules:
        - alert: FirecrawlLBHighErrorRate
          expr: |
            (
              rate(firecrawl_lb_requests_total{status=~"5.."}[5m])
              / rate(firecrawl_lb_requests_total[5m])
            ) > 0.05
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "firecrawl-lb high error rate"
            description: "5xx error rate is above 5% for 5 minutes"
        - alert: FirecrawlLBHighLatency
          expr: |
            histogram_quantile(0.99,
              rate(firecrawl_lb_request_duration_seconds_bucket[5m])
            ) > 10
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "firecrawl-lb high p99 latency"
            description: "p99 request latency is above 10 seconds"
        - alert: FirecrawlLBPodDown
          expr: |
            kube_statefulset_status_replicas_ready{statefulset="{{ include "firecrawl-lb.workloadName" . }}"}
            < kube_statefulset_replicas{statefulset="{{ include "firecrawl-lb.workloadName" . }}"}
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "firecrawl-lb pods unavailable"
            description: "Available replicas is less than desired"
        - alert: FirecrawlLBHPAAtMax
          expr: |
            kube_horizontalpodautoscaler_status_current_replicas{horizontalpodautoscaler="{{ include "firecrawl-lb.fullname" . }}"}
            >= kube_horizontalpodautoscaler_spec_max_replicas{horizontalpodautoscaler="{{ include "firecrawl-lb.fullname" . }}"}
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "firecrawl-lb HPA at maximum replicas"
            description: "HPA has been at maximum replicas for 15 minutes"
        {{- with .Values.metrics.prometheusRule.additionalRules }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
{{- end }}
