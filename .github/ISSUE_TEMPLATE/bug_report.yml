name: 🐛 Bug Report
description: Report a reproducible bug, crash, or unexpected behavior in firecrawl-lb.
title: "bug: <one-line summary of what's broken>"
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! 🙏

        Before you continue:
        - Search [open & closed issues](https://github.com/Soju06/firecrawl-lb/issues?q=is%3Aissue) — your problem may already be known.
        - For "how do I…?" questions, please use [Discussions](https://github.com/Soju06/firecrawl-lb/discussions) instead.
        - For security vulnerabilities, use a [private advisory](https://github.com/Soju06/firecrawl-lb/security/advisories/new) — **do not** post them here.

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checklist
      description: Confirm each item before submitting.
      options:
        - label: I searched existing issues and confirmed this is not a duplicate.
          required: true
        - label: I am running a supported firecrawl-lb version (see Releases).
          required: true
        - label: I can reproduce the problem with the steps below.
          required: true

  - type: input
    id: version
    attributes:
      label: firecrawl-lb version
      description: Output of `firecrawl-lb --version` or the image tag you deployed.
      placeholder: "0.1.0-beta.1"
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment method
      multiple: false
      options:
        - uvx (firecrawl-lb)
        - pip install firecrawl-lb
        - Docker (ghcr.io/Soju06/firecrawl-lb)
        - Docker Compose
        - Helm chart (oci://ghcr.io/soju06/charts/firecrawl-lb)
        - From source
        - Other (describe below)
    validations:
      required: true

  - type: dropdown
    id: client
    attributes:
      label: Client used against firecrawl-lb
      multiple: true
      description: Select every client that triggers the bug.
      options:
        - Firecrawl SDK
        - Direct HTTP (curl)
        - Dashboard
        - Reverse proxy / ingress
        - Scheduled refresh
        - Other (describe below)
    validations:
      required: true

  - type: dropdown
    id: account_plan
    attributes:
      label: Firecrawl account type(s) involved
      multiple: true
      description: Account or billing type of the upstream account(s) in the affected pool.
      options:
        - Team
        - Enterprise
        - API key
        - Mixed pool
        - Not sure
    validations:
      required: true

  - type: input
    id: model
    attributes:
      label: Endpoint(s) involved
      description: Exact Firecrawl endpoint(s) from the request that fails.
      placeholder: "/v2/scrape, /v2/crawl/{job_id}"

  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: Describe the actual behavior. Include error messages verbatim.
      placeholder: |
        e.g. "POST /v2/scrape returns 502 when one account is rate-limited
        even though another active credential has remaining credits."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal reproduction — config, request payload, command sequence.
      placeholder: |
        1. Start firecrawl-lb with `docker compose up -d` (compose snippet below).
        2. Add two Firecrawl credentials in the dashboard.
        3. Run `curl http://localhost:2465/v2/scrape ...`.
        4. Observe the response.
      render: markdown
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        Paste the **firecrawl-lb server logs** spanning the failing request. Redact API
        keys, tokens, and any account identifiers before pasting.
      render: shell

  - type: textarea
    id: config
    attributes:
      label: Configuration / environment
      description: |
        Anonymized excerpt of your deployment config — env vars, compose file, helm
        values, or `config.yaml`. Strip secrets.
      render: yaml

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Screenshots of the dashboard, network captures, related issues, etc.
