services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - path: .env.local
        required: false
    ports:
      - "2465:2465"
    command:
      - fastapi
      - run
      - app/main.py
      - --host
      - 0.0.0.0
      - --port
      - "2465"
      - --reload
    volumes:
      - firecrawl-lb-data:/var/lib/firecrawl-lb
    develop:
      watch:
        - action: sync
          path: ./app
          target: /app/app
        - action: rebuild
          path: ./pyproject.toml
        - action: rebuild
          path: ./uv.lock
        - action: rebuild
          path: ./Dockerfile
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile_inline: |
        FROM oven/bun:1.3.14-alpine
        WORKDIR /app
        COPY package.json bun.lock ./
        RUN bun install --frozen-lockfile
        COPY . .
        CMD ["bun", "run", "dev", "--host", "0.0.0.0"]
    ports:
      - "5173:5173"
    environment:
      API_PROXY_TARGET: http://server:2465
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /app
          ignore:
            - node_modules/
        - action: rebuild
          path: ./frontend/package.json
        - action: rebuild
          path: ./frontend/bun.lock

  postgres:
    image: postgres:18-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_USER: firecrawl_lb
      POSTGRES_PASSWORD: firecrawl_lb
      POSTGRES_DB: firecrawl_lb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U firecrawl_lb -d firecrawl_lb"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - firecrawl-lb-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  firecrawl-lb-data:
    name: firecrawl-lb-data
  firecrawl-lb-postgres-data:
    name: firecrawl-lb-postgres-data
